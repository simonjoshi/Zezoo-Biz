<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ZeeZoo-Biz — Business Acquisition Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fef9f2;--surface:#f2ede4;--surface-low:#f8f3ea;
  --ink:#34322b;--muted:#625f56;--primary:#416752;--white:#fff;
  --border:rgba(65,103,82,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}

/* NAV */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(254,249,242,0.88);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 40px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em;color:var(--ink)}
.brand span{color:var(--primary)}
.nav-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--primary);background:rgba(65,103,82,.1);border:1px solid rgba(65,103,82,.2);
  padding:4px 12px;border-radius:999px}

/* HERO */
.hero{padding:72px 40px 48px;text-align:center;max-width:900px;margin:0 auto}
.hero h1{font-size:clamp(3rem,8vw,6.5rem);font-weight:800;letter-spacing:-.04em;line-height:.9;margin-bottom:20px}
.hero h1 span{color:var(--primary)}
.hero p{font-size:1.15rem;color:var(--muted);max-width:48ch;margin:0 auto 40px;font-weight:500;opacity:.8;line-height:1.65}

/* SEARCH BAR */
.search-wrap{max-width:860px;margin:0 auto;
  background:var(--surface-low);border:1px solid rgba(255,255,255,.6);
  border-radius:999px;padding:8px;
  display:flex;align-items:center;gap:4px;
  box-shadow:0 20px 50px rgba(0,0,0,.05)
}
.search-wrap input{
  flex:1;background:#fff;border:none;outline:none;
  font-family:inherit;font-size:.95rem;font-weight:500;
  color:var(--ink);padding:14px 20px;border-radius:999px;
}
.search-wrap input::placeholder{color:var(--muted);opacity:.6}
.search-wrap .divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
.search-wrap input.loc{max-width:220px}
.search-btn{
  padding:14px 32px;background:var(--primary);color:#fff;
  border:none;border-radius:999px;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.search-btn:hover{background:#355843;transform:translateY(-1px);box-shadow:0 10px 28px rgba(65,103,82,.3)}
.search-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* RESULTS SECTION */
.results-section{background:var(--surface);border-radius:40px 40px 0 0;margin-top:48px;padding:52px 40px 80px;min-height:500px}
.section-title{font-size:clamp(1.8rem,4vw,3rem);font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.section-title span{color:var(--primary)}
.section-sub{color:var(--muted);font-weight:500;margin-bottom:40px;opacity:.8}

/* CARDS GRID */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}

.card{
  background:var(--white);border-radius:20px;padding:24px;
  border:1px solid rgba(65,103,82,.08);
  transition:transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;gap:14px;
}
.card:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(52,50,43,.08)}
.card-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--primary);background:rgba(65,103,82,.08);
  padding:4px 10px;border-radius:999px}
.card h3{font-size:1.05rem;font-weight:700;line-height:1.3;letter-spacing:-.01em;color:var(--ink)}
.card p{font-size:.875rem;color:var(--muted);line-height:1.6;flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.card-price{font-size:.95rem;font-weight:800;color:var(--primary)}
.card-loc{font-size:.8rem;color:var(--muted);font-weight:500}
.card-link{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface-low);color:var(--ink);
  padding:9px 18px;border-radius:12px;font-size:.85rem;font-weight:600;
  border:1px solid var(--border);transition:all .15s;margin-top:auto;width:fit-content;
}
.card-link:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:80px 24px;color:var(--muted)}
.empty svg{margin:0 auto 20px;display:block;opacity:.25}
.empty h3{font-size:1.3rem;font-weight:700;color:var(--ink);margin-bottom:8px}
.spinner{width:36px;height:36px;border:3px solid rgba(65,103,82,.15);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
footer{background:var(--white);border-top:1px solid var(--border);
  padding:28px 40px;display:flex;justify-content:space-between;align-items:center;
  font-size:.85rem;color:var(--muted);flex-wrap:wrap;gap:8px}
footer a{color:var(--primary);font-weight:600}

/* MOBILE */
@media(max-width:640px){
  header,footer{padding:0 20px}
  .hero{padding:48px 20px 32px}
  .search-wrap{flex-direction:column;border-radius:20px;padding:12px}
  .search-wrap input,.search-wrap input.loc{max-width:none}
  .search-wrap .divider{display:none}
  .search-btn{width:100%;justify-content:center}
  .results-section{padding:36px 20px 60px;border-radius:24px 24px 0 0}
}
</style>
</head>
<body>

<header>
  <div class="brand">ZeeZoo<span>-Biz</span></div>
  <span class="nav-tag">Business Search</span>
</header>

<div class="hero">
  <h1>Acquire.<br><span>Scale. Grow.</span></h1>
  <p>Search real businesses for sale across BizBuySell, LoopNet, and more — powered by live web data.</p>

  <form class="search-wrap" id="searchForm">
    <input type="text" id="queryInput" placeholder="What kind of business?" required autocomplete="off"/>
    <div class="divider"></div>
    <input type="text" id="locationInput" class="loc" placeholder="City, State (optional)" autocomplete="off"/>
    <button class="search-btn" type="submit" id="searchBtn">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Search
    </button>
  </form>
</div>

<div class="results-section" id="resultsSection">
  <div id="resultsTitle">
    <div class="section-title">Featured Listings<span>.</span></div>
    <div class="section-sub">Hand-picked businesses available right now.</div>
  </div>
  <div id="cards" class="cards"></div>
</div>

<footer>
  <span>© 2026 ZeeZoo-Biz — Real business acquisition search</span>
  <a href="https://zeezoo.onrender.com">← Back to ZeeZoo</a>
</footer>

<script>
const cardsEl = document.getElementById('cards');
const titleEl = document.getElementById('resultsTitle');

function renderCards(results) {
  if (!results.length) {
    cardsEl.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <h3>No listings found</h3>
      <p>Try a different search term or location.</p>
    </div>`;
    return;
  }
  cardsEl.innerHTML = results.map(b => `
    <div class="card">
      <span class="card-tag">For Sale</span>
      <h3>${esc(b.name)}</h3>
      <p>${esc(b.description)}</p>
      <div class="card-meta">
        ${b.price ? `<span class="card-price">${esc(b.price)}</span>` : ''}
        <span class="card-loc">📍 ${esc(b.location)}</span>
      </div>
      <a class="card-link" href="${esc(b.sourceUrl)}" target="_blank" rel="noopener">
        View Listing
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>`).join('');
}

function setLoading(msg) {
  cardsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="spinner"></div><p>${msg}</p></div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Load featured on mount
async function loadFeatured() {
  setLoading('Scanning marketplace…');
  try {
    const r = await fetch('/api/search?type=featured');
    const data = await r.json();
    renderCards(data);
  } catch(e) {
    cardsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><h3>Could not load listings</h3><p>Please try again in a moment.</p></div>`;
  }
}

// Search
document.getElementById('searchForm').addEventListener('submit', async e => {
  e.preventDefault();
  const q   = document.getElementById('queryInput').value.trim();
  const loc = document.getElementById('locationInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = 'Searching…';

  titleEl.innerHTML = `<div class="section-title">Results for "<span>${esc(q)}</span>"</div>
    <div class="section-sub">${loc ? `In ${esc(loc)}` : 'United States'} · Live marketplace data</div>`;
  setLoading('Finding businesses…');

  try {
    const params = new URLSearchParams({ q, location: loc });
    const r = await fetch('/api/search?' + params);
    const data = await r.json();
    renderCards(data);
  } catch(e) {
    cardsEl.innerHTML = `<div class="empty" style="grid-column:1/-1"><h3>Search failed</h3><p>Please try again.</p></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Search';
  }
});

loadFeatured();
</script>
</body>
</html>
